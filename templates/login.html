{% extends "base.html" %}

{% block title %}Login - Learning Sequence Manager{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 5rem;">
    <div class="card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 class="mt-3">Login</h2>
                <p class="text-muted">Enter your credentials to access the system</p>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
        </div>
    </div>
    
    <div class="text-center mt-3">
        <small class="text-muted">
            <i class="bi bi-info-circle"></i> Configure credentials in .env file
        </small>
    </div>
</div>
{% endblock %}
